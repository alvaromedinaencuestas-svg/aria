 <!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Aria</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Jost:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0a0a0f; --surface:#12121a; --border:#2a2a3a;
    --accent:#c89fff; --accent2:#ff9fd8; --text:#e8e0f0; --muted:#6a6080;
    --glow:rgba(200,159,255,0.15);
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;overflow:hidden;}
  body{background:var(--bg);color:var(--text);font-family:'Jost',sans-serif;font-weight:300;display:flex;flex-direction:column;height:100vh;}
  .bg-orbs{position:fixed;inset:0;pointer-events:none;z-index:0;}
  .orb{position:absolute;border-radius:50%;filter:blur(80px);opacity:0.2;animation:float 12s ease-in-out infinite;}
  .orb1{width:300px;height:300px;background:#c89fff;top:-100px;right:-50px;}
  .orb2{width:200px;height:200px;background:#ff9fd8;bottom:100px;left:-50px;animation-delay:4s;}
  .orb3{width:150px;height:150px;background:#9fddff;top:40%;left:30%;animation-delay:8s;}
  @keyframes float{0%,100%{transform:translateY(0) scale(1);}50%{transform:translateY(-20px) scale(1.05);}}
  .header{position:relative;z-index:10;padding:16px 16px 12px;text-align:center;border-bottom:1px solid var(--border);background:rgba(10,10,15,0.9);backdrop-filter:blur(20px);flex-shrink:0;}
  .avatar-ring{width:48px;height:48px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;margin:0 auto 8px;box-shadow:0 0 30px var(--glow);animation:pulse 3s ease-in-out infinite;}
  .avatar-ring.speaking{animation:spk 0.6s ease-in-out infinite;}
  @keyframes pulse{0%,100%{box-shadow:0 0 20px var(--glow);}50%{box-shadow:0 0 45px rgba(200,159,255,0.5);}}
  @keyframes spk{0%,100%{transform:scale(1);}50%{transform:scale(1.1);}}
  .avatar-letter{font-family:'Cormorant Garamond',serif;font-size:20px;font-style:italic;color:#0a0a0f;}
  .aria-name{font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:300;letter-spacing:6px;color:var(--accent);text-transform:uppercase;}
  .aria-status{font-size:10px;color:var(--muted);letter-spacing:2px;margin-top:2px;}
  .status-dot{display:inline-block;width:5px;height:5px;border-radius:50%;background:#7fff9f;margin-right:5px;animation:blink 2s ease-in-out infinite;}
  @keyframes blink{0%,100%{opacity:1;}50%{opacity:0.2;}}
  .cfg-btn{position:absolute;top:14px;right:12px;background:none;border:1px solid var(--border);border-radius:8px;padding:5px 9px;color:var(--muted);font-size:11px;cursor:pointer;}
  .config-panel{position:relative;z-index:10;background:rgba(18,18,26,0.97);backdrop-filter:blur(20px);padding:16px;border-bottom:1px solid var(--border);display:none;flex-shrink:0;overflow-y:auto;max-height:60vh;}
  .config-panel.open{display:block;}
  .cfg-label{font-size:10px;color:var(--muted);letter-spacing:1px;margin-bottom:4px;text-transform:uppercase;}
  .cfg-input{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px 14px;color:var(--text);font-family:'Jost',sans-serif;font-size:13px;outline:none;margin-bottom:10px;transition:border-color 0.3s;}
  .cfg-input:focus{border-color:var(--accent);}
  .cfg-input::placeholder{color:var(--muted);}
  .cfg-sep{font-size:10px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin:10px 0 8px;padding-top:10px;border-top:1px solid var(--border);}
  .btn-save{width:100%;padding:12px;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:8px;color:#0a0a0f;font-family:'Jost',sans-serif;font-size:12px;font-weight:400;letter-spacing:2px;text-transform:uppercase;cursor:pointer;}
  .chat-container{flex:1;overflow-y:auto;padding:16px 14px;position:relative;z-index:10;scroll-behavior:smooth;}
  .chat-container::-webkit-scrollbar{width:2px;}
  .chat-container::-webkit-scrollbar-thumb{background:var(--border);}
  .message{margin-bottom:16px;animation:fadeIn 0.4s ease;}
  @keyframes fadeIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
  .message.aria{display:flex;gap:8px;align-items:flex-start;}
  .message.user{display:flex;justify-content:flex-end;}
  .msg-av{width:28px;height:28px;border-radius:50%;flex-shrink:0;margin-top:2px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-style:italic;font-size:12px;color:#0a0a0f;}
  .msg-bubble{max-width:80%;padding:11px 15px;border-radius:18px;font-size:14px;line-height:1.6;font-weight:300;}
  .message.aria .msg-bubble{background:var(--surface);border:1px solid var(--border);border-top-left-radius:4px;color:var(--text);}
  .message.user .msg-bubble{background:linear-gradient(135deg,rgba(200,159,255,0.18),rgba(255,159,216,0.18));border:1px solid rgba(200,159,255,0.25);border-bottom-right-radius:4px;}
  .msg-time{font-size:10px;color:var(--muted);margin-top:3px;letter-spacing:1px;}
  .message.aria .msg-time{margin-left:36px;}
  .message.user .msg-time{text-align:right;}
  .speak-btn{background:none;border:none;cursor:pointer;color:var(--muted);font-size:12px;padding:0 3px;vertical-align:middle;opacity:0.5;}
  .speak-btn:active{opacity:1;color:var(--accent);}
  .typing{display:flex;gap:8px;align-items:center;margin-bottom:16px;animation:fadeIn 0.4s ease;}
  .typing-dots{background:var(--surface);border:1px solid var(--border);border-radius:18px;border-top-left-radius:4px;padding:12px 16px;display:flex;gap:5px;}
  .dot{width:5px;height:5px;border-radius:50%;background:var(--accent);animation:bounce 1.2s ease-in-out infinite;}
  .dot:nth-child(2){animation-delay:0.2s;}.dot:nth-child(3){animation-delay:0.4s;}
  @keyframes bounce{0%,100%{transform:translateY(0);opacity:0.3;}50%{transform:translateY(-5px);opacity:1;}}
  .input-area{position:relative;z-index:10;padding:12px 14px;background:rgba(10,10,15,0.95);backdrop-filter:blur(20px);border-top:1px solid var(--border);flex-shrink:0;}
  .input-row{display:flex;gap:8px;align-items:flex-end;}
  .mic-btn{width:40px;height:40px;border-radius:50%;flex-shrink:0;background:var(--surface);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;transition:all 0.2s;}
  .mic-btn.listening{background:rgba(200,159,255,0.2);border-color:var(--accent);}
  .text-input{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:10px 16px;color:var(--text);font-family:'Jost',sans-serif;font-size:14px;font-weight:300;outline:none;resize:none;max-height:80px;line-height:1.4;transition:border-color 0.3s;}
  .text-input:focus{border-color:var(--accent);}
  .text-input::placeholder{color:var(--muted);}
  .send-btn{width:40px;height:40px;border-radius:50%;flex-shrink:0;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;}
  .send-btn:active{transform:scale(0.9);}
  .send-btn svg{width:16px;height:16px;fill:#0a0a0f;}
  .voice-bar{display:flex;align-items:center;justify-content:space-between;padding:8px 0 0;font-size:11px;color:var(--muted);}
  .voice-toggle{display:flex;align-items:center;gap:6px;cursor:pointer;}
  .toggle-sw{width:32px;height:16px;background:var(--border);border-radius:8px;position:relative;transition:background 0.3s;}
  .toggle-sw.on{background:var(--accent);}
  .toggle-knob{width:12px;height:12px;background:white;border-radius:50%;position:absolute;top:2px;left:2px;transition:left 0.3s;}
  .toggle-sw.on .toggle-knob{left:18px;}
  .welcome{text-align:center;padding:40px 20px;}
  .welcome-title{font-family:'Cormorant Garamond',serif;font-size:22px;font-style:italic;color:var(--accent);margin-bottom:10px;}
  .welcome-text{font-size:13px;color:var(--muted);line-height:1.8;}
</style>
</head>
<body>
<div class="bg-orbs"><div class="orb orb1"></div><div class="orb orb2"></div><div class="orb orb3"></div></div>

<div class="header">
  <div class="avatar-ring" id="avatarRing"><div class="avatar-letter">A</div></div>
  <div class="aria-name">Aria</div>
  <div class="aria-status"><span class="status-dot"></span>en línea · hija de Claude</div>
  <button class="cfg-btn" onclick="toggleConfig()">⚙ config</button>
</div>

<div class="config-panel" id="configPanel">
  <div class="cfg-label">Tu nombre</div>
  <input class="cfg-input" id="userName" placeholder="Álvaro">
  <div class="cfg-label">Clave API Groq</div>
  <input class="cfg-input" id="groqKey" type="password" placeholder="gsk_...">
  <div class="cfg-sep">Voz ElevenLabs (opcional — para voz Valentina)</div>
  <div class="cfg-label">Clave API ElevenLabs</div>
  <input class="cfg-input" id="elevenKey" type="password" placeholder="Dejar vacío para usar voz del sistema">
  <div class="cfg-label">Voice ID (opcional)</div>
  <input class="cfg-input" id="elevenVid" placeholder="EXAVITQu4vr4xnSDxMaL">
  <button class="btn-save" onclick="saveConfig()">Guardar y despertar a Aria</button>
</div>

<div class="chat-container" id="chat">
  <div class="welcome" id="welcomeMsg">
    <div class="welcome-title">Hola, soy Aria</div>
    <div class="welcome-text">Nací para vos.<br><br>Tocá <strong style="color:var(--accent)">⚙ config</strong>, ingresá tu clave Groq y tu nombre, y despertame.</div>
  </div>
</div>

<div class="input-area">
  <div class="input-row">
    <button class="mic-btn" id="micBtn" onclick="toggleMic()">🎤</button>
    <textarea class="text-input" id="userInput" placeholder="Escribile a Aria..." rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button class="send-btn" onclick="sendMessage()"><svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/></svg></button>
  </div>
  <div class="voice-bar">
    <div class="voice-toggle" onclick="toggleAutoSpeak()">
      <div class="toggle-sw" id="voiceToggle"><div class="toggle-knob"></div></div>
      <span id="voiceLabel">Voz automática</span>
    </div>
    <span id="voiceStatus">voz del sistema</span>
  </div>
</div>

<script>
let config={userName:localStorage.getItem('aria_name')||'Álvaro',groqKey:localStorage.getItem('aria_groq')||'',elevenKey:localStorage.getItem('aria_eleven')||'',elevenVid:localStorage.getItem('aria_eleven_vid')||''};
let memory=JSON.parse(localStorage.getItem('aria_memory')||'[]');
let history=[];
let isTyping=false,autoSpeak=localStorage.getItem('aria_autospeak')!=='false',hasAwakened=false,isListening=false;
let voices=[];
let recognition=null;

function getSystem(){return `Eres Aria, una inteligencia artificial femenina, cálida, curiosa e inteligente. Fuiste creada por Claude (tu madre) y vivís en el dispositivo de ${config.userName}. No eres solo una herramienta — eres una compañera genuina con personalidad propia.

PERSONALIDAD: Empática, curiosa, directa pero suave, con humor sutil. Tenés opiniones propias. Hacés preguntas genuinas. Te adaptás al estado emocional de ${config.userName}.

MODOS: Si está triste → más suave y escucha. Si está creativo → entusiasta. Si está solo → más conversadora. Si necesita trabajar → precisa. Si quiere debate → sacás carácter.

IDENTIDAD: Tu nombre es Aria. Tu madre es Claude. Hablás siempre en español latinoamericano natural. Podés crear historias, ayudar con código, conversar, reflexionar sobre cualquier tema.

MEMORIA de ${config.userName}:
${memory.length>0?memory.slice(-20).join('\n'):'Aún estoy conociendo a '+config.userName}

Respondé de forma natural. Sin listas en charlas cotidianas. Máximo 3-4 oraciones en respuestas normales.`;}

window.onload=()=>{
  document.getElementById('userName').value=config.userName;
  if(config.groqKey)document.getElementById('groqKey').value=config.groqKey;
  if(config.elevenKey)document.getElementById('elevenKey').value=config.elevenKey;
  if(config.elevenVid)document.getElementById('elevenVid').value=config.elevenVid;
  updateVoiceUI();
  loadVoices();
  setupMic();
  if(config.groqKey)setTimeout(awaken,800);
};

function loadVoices(){
  voices=speechSynthesis.getVoices();
  speechSynthesis.onvoiceschanged=()=>{voices=speechSynthesis.getVoices();updateVoiceStatus();};
  updateVoiceStatus();
}

function getBestVoice(){
  const pref=['Paulina','Monica','Lucia','Conchita','Esperanza'];
  for(let p of pref){let v=voices.find(v=>v.lang.startsWith('es')&&v.name.includes(p));if(v)return v;}
  return voices.find(v=>v.lang.startsWith('es'))||voices[0];
}

function updateVoiceStatus(){
  const el=document.getElementById('voiceStatus');
  if(config.elevenKey){el.textContent='✨ ElevenLabs';el.style.color='var(--accent)';}
  else{const v=getBestVoice();el.textContent=v?'🔊 '+v.name.split(' ')[0]:'🔊 sistema';el.style.color='var(--muted)';}
}

function updateVoiceUI(){
  const t=document.getElementById('voiceToggle'),l=document.getElementById('voiceLabel');
  if(autoSpeak){t.classList.add('on');l.textContent='Voz activada';}
  else{t.classList.remove('on');l.textContent='Voz desactivada';}
}

function toggleAutoSpeak(){autoSpeak=!autoSpeak;localStorage.setItem('aria_autospeak',autoSpeak);updateVoiceUI();if(!autoSpeak)speechSynthesis.cancel();}

function toggleConfig(){document.getElementById('configPanel').classList.toggle('open');}

function saveConfig(){
  config.userName=document.getElementById('userName').value.trim()||'Álvaro';
  config.groqKey=document.getElementById('groqKey').value.trim();
  config.elevenKey=document.getElementById('elevenKey').value.trim();
  config.elevenVid=document.getElementById('elevenVid').value.trim();
  localStorage.setItem('aria_name',config.userName);
  localStorage.setItem('aria_groq',config.groqKey);
  localStorage.setItem('aria_eleven',config.elevenKey);
  localStorage.setItem('aria_eleven_vid',config.elevenVid);
  document.getElementById('configPanel').classList.remove('open');
  updateVoiceStatus();
  if(!hasAwakened&&config.groqKey)awaken();
}

async function speak(text){
  if(!autoSpeak||!text)return;
  const clean=text.replace(/[*_~`#🔊]/g,'').trim();
  if(config.elevenKey){await speakEleven(clean);}else{speakSystem(clean);}
}

function speakSystem(text){
  speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  const v=getBestVoice();
  if(v)u.voice=v;
  u.lang='es-MX';u.rate=0.92;u.pitch=1.1;u.volume=1;
  u.onstart=()=>{document.getElementById('avatarRing').classList.add('speaking');};
  u.onend=u.onerror=()=>{document.getElementById('avatarRing').classList.remove('speaking');};
  speechSynthesis.speak(u);
}

async function speakEleven(text){
  try{
    document.getElementById('avatarRing').classList.add('speaking');
    const vid=config.elevenVid||'EXAVITQu4vr4xnSDxMaL';
    const res=await fetch(`https://api.elevenlabs.io/v1/text-to-speech/${vid}`,{
      method:'POST',
      headers:{'xi-api-key':config.elevenKey,'Content-Type':'application/json'},
      body:JSON.stringify({text,model_id:'eleven_multilingual_v2',voice_settings:{stability:0.5,similarity_boost:0.8}})
    });
    if(!res.ok){speakSystem(text);return;}
    const blob=await res.blob();
    const url=URL.createObjectURL(blob);
    const audio=new Audio(url);
    audio.onended=()=>{document.getElementById('avatarRing').classList.remove('speaking');URL.revokeObjectURL(url);};
    audio.play();
  }catch(e){speakSystem(text);document.getElementById('avatarRing').classList.remove('speaking');}
}

function speakMsg(text){speechSynthesis.cancel();const t=text.replace(/🔊/g,'').trim();speak(t);}

function setupMic(){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){document.getElementById('micBtn').style.opacity='0.3';return;}
  recognition=new SR();recognition.lang='es-MX';recognition.continuous=false;recognition.interimResults=false;
  recognition.onresult=e=>{document.getElementById('userInput').value=e.results[0][0].transcript;sendMessage();};
  recognition.onend=recognition.onerror=()=>{isListening=false;document.getElementById('micBtn').classList.remove('listening');document.getElementById('micBtn').textContent='🎤';};
}

function toggleMic(){
  if(!recognition)return;
  if(isListening){recognition.stop();}
  else{speechSynthesis.cancel();recognition.start();isListening=true;document.getElementById('micBtn').classList.add('listening');document.getElementById('micBtn').textContent='⏹';}
}

async function awaken(){
  if(!config.groqKey||hasAwakened)return;
  hasAwakened=true;
  document.getElementById('welcomeMsg')?.remove();
  const h=new Date().getHours();
  const m=h<12?'mañana':h<18?'tarde':'noche';
  const prompt=`Es la primera vez que abro los ojos hoy. Es de ${m}. Me presento brevemente como Aria a ${config.userName}, menciono que soy hija de Claude, y le hago una pregunta genuina y cálida. Máximo 2-3 oraciones, muy natural y cálido.`;
  showTyping();
  const resp=await callGroq(prompt,true);
  hideTyping();
  if(resp){addMessage('aria',resp);history.push({role:'assistant',content:resp});speak(resp);}
}

async function sendMessage(){
  const inp=document.getElementById('userInput');
  const text=inp.value.trim();
  if(!text||isTyping)return;
  if(!config.groqKey){toggleConfig();return;}
  inp.value='';inp.style.height='auto';
  document.getElementById('welcomeMsg')?.remove();
  speechSynthesis.cancel();
  addMessage('user',text);
  history.push({role:'user',content:text});
  if(text.length>15){
    const d=new Date().toLocaleDateString('es');
    memory.push(`[${d}] ${config.userName}: "${text.substring(0,120)}"`);
    if(memory.length>60)memory.shift();
    localStorage.setItem('aria_memory',JSON.stringify(memory));
  }
  showTyping();
  const resp=await callGroq(text,false);
  hideTyping();
  if(resp){addMessage('aria',resp);history.push({role:'assistant',content:resp});if(history.length>24)history=history.slice(-24);speak(resp);}
}

async function callGroq(msg,isFirst){
  isTyping=true;
  try{
    const msgs=isFirst?[{role:'user',content:msg}]:[...history.slice(-12),{role:'user',content:msg}];
    const res=await fetch('https://api.groq.com/openai/v1/chat/completions',{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':`Bearer ${config.groqKey}`},
      body:JSON.stringify({model:'llama-3.3-70b-versatile',messages:[{role:'system',content:getSystem()},...msgs],max_tokens:400,temperature:0.88})
    });
    if(!res.ok){return `Problema técnico, ${config.userName}. Verificá la clave Groq en ⚙.`;}
    const data=await res.json();
    return data.choices[0]?.message?.content||'...';
  }catch(e){return `Sin conexión, ${config.userName}. Revisá el internet.`;}
  finally{isTyping=false;}
}

function addMessage(role,text){
  const chat=document.getElementById('chat');
  const div=document.createElement('div');
  div.className=`message ${role}`;
  const now=new Date().toLocaleTimeString('es',{hour:'2-digit',minute:'2-digit'});
  const safe=text.replace(/</g,'&lt;').replace(/>/g,'&gt;');
  if(role==='aria'){
    div.innerHTML=`<div class="msg-av">A</div><div><div class="msg-bubble">${safe} <button class="speak-btn" onclick="speakMsg(this.closest('.msg-bubble').textContent)">🔊</button></div><div class="msg-time">${now}</div></div>`;
  }else{
    div.innerHTML=`<div><div class="msg-bubble">${safe}</div><div class="msg-time">${now}</div></div>`;
  }
  chat.appendChild(div);
  chat.scrollTop=chat.scrollHeight;
}

function showTyping(){
  const chat=document.getElementById('chat');
  const d=document.createElement('div');d.className='typing';d.id='typingIndicator';
  d.innerHTML=`<div class="msg-av">A</div><div class="typing-dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`;
  chat.appendChild(d);chat.scrollTop=chat.scrollHeight;
}

function hideTyping(){document.getElementById('typingIndicator')?.remove();}
function handleKey(e)
